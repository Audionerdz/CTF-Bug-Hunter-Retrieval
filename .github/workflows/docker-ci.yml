name: Docker CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (CI)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: atlas-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run --rm atlas-engine:ci -c "from atlas_engine import Atlas; Atlas(); print('smoke-ok')"

      - name: GraphRAG smoke test
        run: |
          docker run --rm atlas-engine:ci -c "from atlas_engine.graph import SemanticGraph; g = SemanticGraph(); print('graph-ok')"

      - name: Prepare CI env files
        if: ${{ secrets.OPENAI_API_KEY != '' && secrets.PINECONE_API_KEY != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: |
          mkdir -p .env
          printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" > .env/openai.env
          printf 'PINECONE_API_KEY=%s\n' "$PINECONE_API_KEY" > .env/pinecone.env

      - name: Atlas integration flow (GPT + query + fetch + vectorize + delete)
        if: ${{ secrets.OPENAI_API_KEY != '' && secrets.PINECONE_API_KEY != '' }}
        env:
          ATLAS_CI_NAMESPACE: ci-${{ github.run_id }}
        run: |
          docker run --rm \
            -e ATLAS_CI_NAMESPACE="$ATLAS_CI_NAMESPACE" \
            -v "$PWD/.env:/app/.env:ro" \
            atlas-engine:ci src/ci_integration.py

  publish-ghcr:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
