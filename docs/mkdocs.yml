site_name: Bug Hunter CTF Retrieval System
site_description: Semantic note retrieval for CTF competitors and security researchers. Query your knowledge base from Telegram.
theme:
  name: material
  palette:
    scheme: slate
    primary: blue
    accent: cyan
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.tabs.link
    - toc.follow

plugins:
  - search:
      lang: en
  - with-pdf:
      output_path: ctf-bug-hunter-retrieval.pdf
      cover_title: "Bug Hunter CTF Retrieval System"
      cover_subtitle: "Complete Guide to Semantic Chunking, Pinecone Integration & Knowledge Management (Ultimate Edition - Feb 2026)"
      author: "OpenCode"
      copyright: "2026"
      toc_title: "Table of Contents"
      ordered_chapter_level: 2
      back_cover: false
      exclude_pages:
          - 'index'
      excludes_children:
          - 'index'

nav:
  - Home: index.md
  - Part 1 - Introduction:
      - Welcome: 1-intro/welcome.md
      - What is RAG: 1-intro/what-is-rag.md
      - Overview of the Methodology: 1-intro/overview.md
  - Part 2 - Chunking Methodology:
      - Core Principles: 2-chunking-methodology/core-principles.md
      - Chunk ID Schema: 2-chunking-methodology/chunk-id-examples.md
      - Chunk Fields Explained: 2-chunking-methodology/chunk-fields.md
      - Manifest JSON Guide: 2-chunking-methodology/manifest-json.md
  - Part 3 - Pinecone Complete Guide:
      - Getting Started: 3-pinecone-guide/quick-start.md
      - Installation & Setup: 3-pinecone-guide/installation.md
      - Configuration: 3-pinecone-guide/configuration.md
      - Quick Commands: 3-pinecone-guide/quick-commands.md
      - Concepts Explained: 3-pinecone-guide/concepts.md
      - Troubleshooting: 3-pinecone-guide/troubleshooting.md
      - Index Management: 3-pinecone-guide/index-management.md
      - Scripts Reference: 3-pinecone-guide/scripts-reference.md
      - Vectorizer Setup: 3-pinecone-guide/vectorizer-setup.md
      - PDF Integration: 3-pinecone-guide/pdf-integration.md
      - Configurations: 3-pinecone-guide/rag-system-configurations.md
      - 3072D Setup: 3-pinecone-guide/3072d-setup.md
  - Part 4 - RAG Architecture:
      - Architecture Overview: 4-rag-architecture/rag-system-architecture.md
      - Complete Index Guide: 4-rag-architecture/complete-index-guide.md
      - System Update Guide: 4-rag-architecture/system-update.md
  - Part 5 - Advanced Topics:
      - FAQs: 5-advanced-topics/faqs.md
      - Best Practices: 5-advanced-topics/best-practices.md
      - Reference Table: 5-advanced-topics/reference-table.md
  - Part 6 - Manual Pinecone Operations:
      - Introduction: 6-manual-pinecone-operations/index.md
      - CLI Essentials: 6-manual-pinecone-operations/pinecone-cli-essentials.md
      - Embedding Chunks Manually: 6-manual-pinecone-operations/embedding-chunks-manually.md
      - Upserting Vectors: 6-manual-pinecone-operations/upserting-vectors.md
      - Querying and Searching: 6-manual-pinecone-operations/querying-searching.md
      - Managing Vectors: 6-manual-pinecone-operations/managing-vectors.md
      - Index Management: 6-manual-pinecone-operations/index-management-manual.md
      - Real-World Examples: 6-manual-pinecone-operations/real-world-examples.md
  - Part 7 - Telegram Integration & Scripts:
      - Introduction: 7-telegram-integration/index.md
      - Vectorizer Complete Guide: 7-telegram-integration/vectorizer-complete-guide.md
      - Vectorization Usage Guide: 7-telegram-integration/vectorization-usage-guide.md
      - Vectorizer Modular: 7-telegram-integration/vectorizer-modular.md
      - Telegram Bot Daemon: 7-telegram-integration/telegram_bot_daemon.md
      - Query Agent Integration: 7-telegram-integration/query-agent-integration.md
      - STT CLI Wrapper: 7-telegram-integration/stt-cli-wrapper.md
      - telegram_sender.py: 7-telegram-integration/telegram_sender_py.md
      - rag_to_telegram.py: 7-telegram-integration/rag_to_telegram_py.md
      - send_directory.py: 7-telegram-integration/send_directory_py.md
      - Usage Examples: 7-telegram-integration/usage-examples.md
      - Troubleshooting: 7-telegram-integration/troubleshooting.md
      - MKDocs Editing Guide: 7-telegram-integration/mkdocs-editing-guide.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - tables
  - admonition

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com
  version: 1.0-ultimate
